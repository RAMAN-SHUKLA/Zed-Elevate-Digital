<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Zed Elevate Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
    <style>
        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: rgba(10, 11, 16, 0.95);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(0, 243, 255, 0.05) 0%, transparent 70%);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
            padding: 12px;
            margin-bottom: 20px;
        }
        .form-control:focus {
            border-color: var(--neon-blue) !important;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <img src="LOGO.png" alt="Logo" height="50" class="mb-3">
                <h4 class="fw-bold">Admin <span class="neon-text">Portal</span></h4>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small opacity-50">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="admin">
                </div>
                <div class="mb-3">
                    <label class="form-label small opacity-50">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="password">
                </div>
                <button type="submit" class="btn-neon w-100 mt-3">LOGIN</button>
            </form>
            <div id="loginError" class="text-danger small mt-3 text-center" style="display: none;">
                Invalid credentials. Please try again.
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simple check (admin/password)
            if (user === 'admin' && pass === 'password') {
                sessionStorage.setItem('zed_admin_auth', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });
    </script>
</body>
</html>
