<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Zed Elevate Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
    <style>
        .dashboard-container { min-height: 100vh; background: #05070a; padding-top: 40px; }
        .admin-card { background: #11141d; border: 1px solid rgba(0, 243, 255, 0.1); border-radius: 15px; padding: 25px; margin-bottom: 25px; }
        .project-list-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .project-list-item img { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; margin-right: 15px; }
        .form-control, .form-select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; margin-bottom: 15px; }
        .btn-delete { color: #ff4d4d; border: 1px solid #ff4d4d; background: transparent; padding: 5px 12px; border-radius: 5px; transition: 0.3s; }
        .btn-delete:hover { background: #ff4d4d; color: white; }
    </style>
</head>
<body>
    <script>
        // Auth Check
        if (sessionStorage.getItem('zed_admin_auth') !== 'true') {
            window.location.href = 'admin.html';
        }
    </script>

    <div class="dashboard-container">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <img src="LOGO.png" alt="Logo" height="40" class="mb-2">
                    <h2 class="fw-bold m-0">Project <span class="neon-text">Manager</span></h2>
                </div>
                <button onclick="logout()" class="btn btn-outline-danger btn-sm">LOGOUT</button>
            </div>

            <div class="row g-4">
                <!-- Upload Form -->
                <div class="col-lg-5">
                    <div class="admin-card">
                        <h4 class="mb-4">Add New Project</h4>
                        <form id="projectForm">
                            <label class="small opacity-50 mb-2">Project Title</label>
                            <input type="text" id="pTitle" class="form-control" required placeholder="Brand Transformation">
                            
                            <label class="small opacity-50 mb-2">Category</label>
                            <select id="pCategory" class="form-select" required>
                                <option value="branding">Branding</option>
                                <option value="marketing">Marketing</option>
                                <option value="web">Web Dev</option>
                            </select>

                            <label class="small opacity-50 mb-2">Banner Image URL</label>
                            <input type="url" id="pImage" class="form-control" required placeholder="https://unsplash.com/...">

                            <label class="small opacity-50 mb-2">Live Project Link</label>
                            <input type="url" id="pLink" class="form-control" required placeholder="https://example.com">

                            <button type="submit" class="btn-neon w-100 mt-2">PUBLISH PROJECT</button>
                        </form>
                    </div>
                </div>

                <!-- Project List -->
                <div class="col-lg-7">
                    <div class="admin-card">
                        <h4 class="mb-4">Live Projects</h4>
                        <div id="adminProjectsList">
                            <!-- List will be populated here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const projectForm = document.getElementById('projectForm');
        const adminProjectsList = document.getElementById('adminProjectsList');

        function loadProjects() {
            const projects = JSON.parse(localStorage.getItem('zed_projects')) || [];
            adminProjectsList.innerHTML = '';
            projects.forEach(p => {
                const item = `
                    <div class="project-list-item">
                        <div class="d-flex align-items-center">
                            <img src="${p.image}" alt="">
                            <div>
                                <div class="fw-bold">${p.title}</div>
                                <div class="small opacity-50 text-uppercase" style="font-size: 10px; letter-spacing: 1px;">${p.category}</div>
                            </div>
                        </div>
                        <button onclick="deleteProject(${p.id})" class="btn-delete"><i class="bi bi-trash"></i></button>
                    </div>
                `;
                adminProjectsList.insertAdjacentHTML('beforeend', item);
            });
        }

        projectForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const projects = JSON.parse(localStorage.getItem('zed_projects')) || [];
            const newProject = {
                id: Date.now(),
                title: document.getElementById('pTitle').value,
                category: document.getElementById('pCategory').value,
                image: document.getElementById('pImage').value,
                link: document.getElementById('pLink').value
            };
            projects.unshift(newProject);
            localStorage.setItem('zed_projects', JSON.stringify(projects));
            projectForm.reset();
            loadProjects();
            // Trigger storage event manually for same tab updates
            window.dispatchEvent(new Event('storage'));
        });

        function deleteProject(id) {
            if (confirm('Delete this project?')) {
                let projects = JSON.parse(localStorage.getItem('zed_projects')) || [];
                projects = projects.filter(p => p.id !== id);
                localStorage.setItem('zed_projects', JSON.stringify(projects));
                loadProjects();
                window.dispatchEvent(new Event('storage'));
            }
        }

        function logout() {
            sessionStorage.removeItem('zed_admin_auth');
            window.location.href = 'admin.html';
        }

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>
</body>
</html>
